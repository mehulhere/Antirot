name: Antirot
options:
  bundleIdPrefix: com.mehulhere
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    VERSIONING_SYSTEM: apple-generic
    DEVELOPMENT_TEAM: 7564AJPLF4
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "9.1.0"
targets:
  Antirot:
    type: application
    platform: iOS
    sources:
      - AntirotAlarm/Sources
      - AntirotAlarm/Resources
      - AntirotShared/Sources
    dependencies:
      - target: AntirotCurrentTaskWidget
        embed: true
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mehulhere.antirot
        INFOPLIST_FILE: AntirotAlarm/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AntirotAlarm/Resources/AntirotAlarm.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "com.mehulhere.antirot AppStore"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: AntirotAlarm/Resources/Info.plist
      properties:
        CFBundleDisplayName: Antirot
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: LaunchBackground
        NSUserNotificationsUsageDescription: Antirot uses notifications to run wake alarms, focus reminders, and overdue-task escalations.
        NSAlarmKitUsageDescription: Antirot uses real system alarms for wakeups, overdue routines, and strict accountability escalation.
        NSFamilyControlsUsageDescription: Antirot can use Screen Time permission to summarize recent distracting app usage when you explicitly authorize it.
        NSMicrophoneUsageDescription: Antirot records short voice check-ins so the coach can transcribe them and respond without making you type.
        UIBackgroundModes:
          - remote-notification
        GIDClientID: 973993815360-7q908kk99vtbvv07648prppfdbacqddr.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.973993815360-7q908kk99vtbvv07648prppfdbacqddr
    entitlements:
      path: AntirotAlarm/Resources/AntirotAlarm.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.mehulhere.antirot
  AntirotDeviceActivityReport:
    type: app-extension
    platform: iOS
    productType: com.apple.product-type.app-extension
    sources:
      - AntirotDeviceActivityReport/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mehulhere.antirot.DeviceActivityReport
        INFOPLIST_FILE: AntirotDeviceActivityReport/Resources/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "com.mehulhere.antirot.DeviceActivityReport AppStore"
    info:
      path: AntirotDeviceActivityReport/Resources/Info.plist
      properties:
          CFBundleDisplayName: "Antirot Report"
          NSExtension:
            NSExtensionPointIdentifier: com.apple.deviceactivityui.report-extension
            NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DeviceActivityReportExtension
  AntirotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AntirotAlarmTests/Sources
    dependencies:
      - target: Antirot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mehulhere.antirot.tests
        INFOPLIST_FILE: AntirotAlarmTests/Info.plist
  AntirotCurrentTaskWidget:
    type: app-extension
    platform: iOS
    productType: com.apple.product-type.app-extension
    sources:
      - AntirotCurrentTaskWidget/Sources
      - AntirotShared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mehulhere.antirot.CurrentTaskWidget
        INFOPLIST_FILE: AntirotCurrentTaskWidget/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AntirotCurrentTaskWidget/Resources/AntirotCurrentTaskWidget.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "com.mehulhere.antirot.CurrentTaskWidget AppStore"
    info:
      path: AntirotCurrentTaskWidget/Resources/Info.plist
      properties:
        CFBundleDisplayName: "Antirot Task"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: AntirotCurrentTaskWidget/Resources/AntirotCurrentTaskWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.mehulhere.antirot
