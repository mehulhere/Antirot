name: Build iOS IPA

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/ios

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          ls -1 /Applications/Xcode*.app || true
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Verify iOS 26 SDK
        run: |
          set -euo pipefail
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "iphoneos SDK: ${SDK_VERSION}"
          case "${SDK_VERSION}" in
            26*) ;;
            *)
              echo "AlarmKit requires an iOS 26 SDK. Refusing to build a notification-only IPA."
              exit 1
              ;;
          esac

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          git clone --filter=blob:none https://github.com/yonaskolb/XcodeGen "${RUNNER_TEMP}/XcodeGen"
          git -C "${RUNNER_TEMP}/XcodeGen" checkout --detach 21ac9944b0ab546a07422dbed86f33dd2ebd76f8
          swift build -c release --package-path "${RUNNER_TEMP}/XcodeGen"
          sudo install -m 755 "${RUNNER_TEMP}/XcodeGen/.build/release/xcodegen" /usr/local/bin/xcodegen
          test "$(xcodegen --version)" = "2.44.1"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app for iPhoneOS
        run: |
          set -euo pipefail
          xcodebuild \
            -project Antirot.xcodeproj \
            -scheme Antirot \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name 'Antirot.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Antirot.app was not produced"
            exit 1
          fi
          rm -rf Payload Antirot-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/Antirot.app
          /usr/bin/zip -qry Antirot-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Antirot-unsigned-ipa
          path: apps/ios/Antirot-unsigned.ipa
          if-no-files-found: error
