name: Deploy Backend VPS

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "env.example.txt"
      - "docs/backend-vps-new-user.md"
      - ".github/workflows/deploy-backend-vps.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull, build, and restart VPS backend
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          ANTIROT_VPS_SSH_KEY: ${{ secrets.ANTIROT_VPS_SSH_KEY }}
          ANTIROT_VPS_HOST: ${{ vars.ANTIROT_VPS_HOST || 'antirot.org' }}
        run: |
          test -n "$ANTIROT_VPS_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ANTIROT_VPS_SSH_KEY" > ~/.ssh/antirot_vps
          chmod 600 ~/.ssh/antirot_vps
          ssh-keyscan -H "$ANTIROT_VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend
        env:
          ANTIROT_VPS_HOST: ${{ vars.ANTIROT_VPS_HOST || 'antirot.org' }}
          ANTIROT_VPS_USER: ${{ vars.ANTIROT_VPS_USER || 'antirot' }}
        run: |
          ssh -i ~/.ssh/antirot_vps \
            -o BatchMode=yes \
            "$ANTIROT_VPS_USER@$ANTIROT_VPS_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          cd /opt/antirot

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "Remote checkout has uncommitted changes. Refusing to deploy over a dirty tree." >&2
            git status --short >&2
            exit 1
          fi

          before="$(git rev-parse HEAD)"
          git fetch origin main
          target="$(git rev-parse origin/main)"

          if [ "$before" = "$target" ]; then
            echo "No new commit on origin/main. Nothing to restart."
            exit 0
          fi

          git pull --ff-only origin main
          after="$(git rev-parse HEAD)"

          if ! git diff --name-only "$before" "$after" | grep -Eq '^(apps/backend/|env\.example\.txt|docs/backend-vps-new-user\.md|\.github/workflows/deploy-backend-vps\.yml)'; then
            echo "No backend deployment-relevant files changed. Nothing to restart."
            exit 0
          fi

          /home/antirot/.cargo/bin/cargo build --release --manifest-path apps/backend/Cargo.toml
          cp apps/backend/target/release/antirot-backend apps/backend/antirot-backend
          chmod 755 apps/backend/antirot-backend

          sudo -n systemctl restart antirot-backend.service
          sudo -n systemctl status antirot-backend.service --no-pager --full | sed -n '1,18p'
          curl -fsS http://127.0.0.1:8787/health
          REMOTE
