name: Backend CI

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "scripts/test-backend-userflows-no-llm.mjs"
      - "scripts/backend-userflow-test-lib.mjs"
      - "package.json"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "scripts/test-backend-userflows-no-llm.mjs"
      - "scripts/backend-userflow-test-lib.mjs"
      - "package.json"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    name: Backend tests and prompt snapshots
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: antirot
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: antirot_backend_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U antirot -d antirot_backend_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://antirot:secret@localhost:5432/antirot_backend_test
      ANTIROT_ADMIN_TOKEN: test-admin-token
      ANTIROT_DEVICE_TOKEN: test-device-token
      ANTIROT_TAILORED_LLM_KEY: not-needed-for-no-llm
      ANTIROT_MEMORY_GEMINI_API_KEY: ""
      ANTIROT_MEMORY_VOYAGE_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cargo check
        run: cargo check --manifest-path apps/backend/Cargo.toml

      - name: Rust tests and prompt snapshots
        run: cargo test --manifest-path apps/backend/Cargo.toml

      - name: Backend no-LLM userflows
        run: npm run test:backend-userflows

      - name: Production security contracts
        run: npm run test:production-contracts && npm run test:device-auth-boundaries && npm run test:alarm-reconciliation-contracts && npm run test:ci-security-contracts
