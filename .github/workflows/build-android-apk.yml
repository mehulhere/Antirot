name: Build Android APK

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/android/**"
      - ".github/workflows/build-android-apk.yml"

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: "9.1.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --dependency-verification=strict

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Antirot-debug-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
